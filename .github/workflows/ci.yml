name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint, format, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (oxlint, warnings are errors)
        run: bun run lint

      - name: Format check (oxfmt)
        run: bun run fmt:check

      - name: Typecheck
        run: bun run check

      - name: Test
        run: |
          if [ -d tests ]; then
            bun test tests
          else
            echo "No tests directory yet; skipping."
          fi
