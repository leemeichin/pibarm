name: Deploy

# Deploys the static Astro site to Cloudflare Workers.
# Until the Cloudflare secrets exist, the deploy step is skipped rather than failing.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SITE_DIR: site

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check prerequisites
        id: prereqs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Cloudflare repository secrets are not set; skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          elif [ ! -e "$SITE_DIR/wrangler.toml" ] && [ ! -e "$SITE_DIR/wrangler.jsonc" ] && [ ! -e "$SITE_DIR/wrangler.json" ]; then
            echo "No wrangler config found in $SITE_DIR; skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.prereqs.outputs.ready == 'true'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ env.SITE_DIR }}/package-lock.json

      - name: Install site dependencies
        if: steps.prereqs.outputs.ready == 'true'
        working-directory: ${{ env.SITE_DIR }}
        run: npm ci

      - name: Build site
        if: steps.prereqs.outputs.ready == 'true'
        working-directory: ${{ env.SITE_DIR }}
        run: npm run build

      - name: Deploy
        if: steps.prereqs.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ env.SITE_DIR }}
