name: Deploy

# Deploys the static Astro site to Cloudflare Workers with credentials loaded
# from the pibarm 1Password vault.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SITE_DIR: site

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ env.SITE_DIR }}/package-lock.json

      - name: Install site dependencies
        working-directory: ${{ env.SITE_DIR }}
        run: npm ci

      - name: Build site
        working-directory: ${{ env.SITE_DIR }}
        run: npm run build

      - name: Load Cloudflare credentials from 1Password
        uses: 1password/load-secrets-action@3a12b0ab99d9cd590a3e9b5a90ea017210ed9556 # v4.0.1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: op://pibarm/CLOUDFLARE_API_TOKEN/credential
          CLOUDFLARE_ACCOUNT_ID: op://pibarm/CLOUDFLARE_ACCOUNT_ID/credential

      - name: Deploy
        working-directory: ${{ env.SITE_DIR }}
        run: npx --yes wrangler@4 deploy
